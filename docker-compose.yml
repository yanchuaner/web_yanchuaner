# ============================================
# 燕中校友数字母港 — Docker Compose
# 部署命令: docker compose up -d
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yanchuan-alumni
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/prod.db
      - PORT=3000
      # Redis (可选):
      # - REDIS_URL=redis://redis:6379
    volumes:
      # 持久化目录
      - ./data:/data
      - ./uploads:/var/www/alumni-site/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis (可选 — 取消注释以启用)
