# ============================================
# 燕川校友数字母港 — Docker Compose
# 部署命令: docker compose up -d
# ============================================

version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yanchuan-alumni
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
      # Redis (可选):
      # - REDIS_URL=redis://redis:6379
    volumes:
      # 持久化 SQLite 数据库
      - ./data/dev.db:/app/dev.db
      # 上传文件目录（如需）
      - ./data/uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis (可选 — 取消注释以启用)
