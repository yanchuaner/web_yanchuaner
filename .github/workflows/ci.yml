name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Typecheck, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: file:./prisma/ci.db
      SESSION_SECRET: ci-temp-session-secret-for-build-only
      APP_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
      SITE_NAME: 燕中校友数字母港
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
